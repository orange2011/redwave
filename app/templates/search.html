{% extends "base.html" %}
{% block title %}Search — Redwave{% endblock %}

{% block head %}
<style>
  .search-shell {
    display: flex;
    flex-direction: column;
    gap: 0.95rem;
    max-width: 100%;
    padding: 0.9rem;
    border-radius: 10px;
    background: var(--panel-soft);
    border: 1px solid var(--border-soft);
    box-shadow: 0 18px 55px rgba(0,0,0,0.28);
    overflow: hidden;
  }
  .search-hero { --search-shift: clamp(0.75rem, 1.4vw, 1.6rem); --search-text-offset: 2.75rem; display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.9rem; }
  .search-hero h1 { width: min(75%, 1180px); box-sizing: border-box; padding-left: var(--search-text-offset); font-size: 1.5rem; line-height: 1.2; font-weight: 700; color: var(--text); margin: 0 auto; transform: translateX(var(--search-shift)); }
  .search-input-wrap { position: relative; width: min(75%, 1180px); margin: 0 auto; transform: translateX(var(--search-shift)); }
  .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--subtle); pointer-events: none; }
  .search-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 999px; padding: 0.85rem 1rem 0.85rem 2.75rem; color: var(--input-text); font-size: 0.98rem; outline: none; box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,57,43,0.28), 0 12px 32px rgba(0,0,0,0.25); }
  .search-quick-tabs {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 0.15rem;
    scrollbar-width: thin;
  }
  .search-quick-tabs button {
    flex: 0 0 auto;
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    line-height: 1;
    padding: 0.55rem 0.72rem;
    border-radius: 999px;
    background: var(--panel-strong);
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .search-quick-tabs button:hover,
  .search-quick-tabs button[aria-pressed="true"] { background: var(--panel-hover); border-color: var(--border); }
  .search-quick-tabs span { color: var(--muted); font-weight: 700; margin-left: 0.25rem; }
  .search-overview { display: grid; grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr); gap: 0.85rem; align-items: stretch; min-width: 0; }
  #top-result,
  #songs { display: flex; flex-direction: column; min-width: 0; }
  .top-result-card { flex: 1; min-height: 132px; background: var(--panel-strong); border: 1px solid var(--border-soft); border-radius: 8px; padding: 0.85rem; display: grid; grid-template-columns: 76px minmax(0, 1fr); align-items: stretch; gap: 0.85rem; text-decoration: none; transition: background .18s, border-color .18s; overflow: hidden; }
  .top-result-card:hover { background: var(--panel-hover); border-color: var(--border); }
  .top-result-cover { width: 76px; height: 76px; border-radius: 6px; background: var(--cover-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--subtle); font-size: 1.7rem; box-shadow: 0 12px 28px rgba(0,0,0,0.4); align-self: start; }
  .top-result-cover.artist { border-radius: 50%; }
  .top-result-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .top-result-body { min-width: 0; min-height: 0; display: flex; flex-direction: column; gap: 0.45rem; }
  .top-result-title { color: var(--text); font-size: clamp(1.15rem, 2vw, 1.55rem); line-height: 1.05; font-weight: 800; letter-spacing: 0; margin-bottom: 0.35rem; overflow-wrap: anywhere; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .top-result-meta { color: var(--muted); font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-result-detail { color: var(--text-soft); font-size: 0.84rem; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-result-about { min-width: 0; min-height: 0; color: var(--text-soft); overflow: hidden; }
  .top-result-about-title { color: var(--text); font-size: 0.78rem; font-weight: 800; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-result-about p { color: var(--text-soft); font-size: 0.79rem; line-height: 1.35; margin: 0; max-height: clamp(4.25rem, 22vh, 9.6rem); overflow: hidden; }
  .top-result-facts { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.45rem; }
  .top-result-facts span { color: var(--text-soft); font-size: 0.7rem; font-weight: 700; line-height: 1; padding: 0.34rem 0.46rem; border-radius: 999px; background: var(--panel-soft); border: 1px solid var(--border-soft); }
  .section-title { color: var(--text); font-size: 1.25rem; font-weight: 800; line-height: 1.15; margin: 0 0 0.45rem; }
  .track-list { flex: 1; display: flex; flex-direction: column; gap: 0.2rem; }
  .track-row { min-height: 48px; display: grid; grid-template-columns: 42px minmax(0, 1fr) auto; align-items: center; gap: 0.65rem; padding: 0.35rem 0.55rem; border-radius: 6px; text-decoration: none; background: var(--panel-soft); border: 1px solid var(--border-soft); transition: background .15s, border-color .15s; overflow: hidden; }
  .track-row:hover { background: var(--panel-hover); border-color: var(--border); }
  .track-cover { width: 40px; height: 40px; border-radius: 4px; overflow: hidden; background: var(--cover-bg); display: flex; align-items: center; justify-content: center; color: var(--subtle); flex-shrink: 0; }
  .track-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .track-name { color: var(--text); font-size: 0.88rem; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta { color: var(--muted); font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-mark { color: var(--subtle); font-size: 0.8rem; padding-right: 0.25rem; }
  .result-shelf { margin-top: 0; min-width: 0; }
  .horizontal-shelf { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(130px, 168px); gap: 0.75rem; max-width: 100%; overflow-x: auto; overflow-y: hidden; padding-bottom: 0.35rem; scroll-snap-type: x proximity; overscroll-behavior-inline: contain; scrollbar-width: thin; }
  .album-card { background: var(--panel-strong); border: 1px solid var(--border-soft); border-radius: 8px; overflow: hidden; display: block; transition: background .18s, border-color .18s, transform .18s; text-decoration: none; scroll-snap-align: start; }
  .album-card:focus-visible,
  .artist-card:focus-visible,
  .track-row:focus-visible,
  .top-result-card:focus-visible,
  .search-quick-tabs button:focus-visible { outline: 2px solid rgba(255,255,255,0.75); outline-offset: 2px; }
  .album-card:hover { background: var(--panel-hover); border-color: var(--border); }
  .album-cover { width: 100%; aspect-ratio: 1/1; background: var(--cover-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 2.25rem; color: var(--subtle); }
  .album-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .album-info { padding: 0.58rem; min-height: 3.8rem; }
  .album-name { color: var(--text); font-size: 0.82rem; line-height: 1.2; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.18rem; }
  .album-artist { color: var(--muted); font-size: 0.76rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .artist-shelf { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(124px, 156px); gap: 0.75rem; max-width: 100%; overflow-x: auto; padding-bottom: 0.35rem; overscroll-behavior-inline: contain; scrollbar-width: thin; }
  .artist-card { text-decoration: none; color: inherit; padding: 0.7rem; border-radius: 8px; background: var(--panel-soft); border: 1px solid var(--border-soft); transition: background .18s, border-color .18s; overflow: hidden; }
  .artist-card:hover { background: var(--panel-hover); border-color: var(--border); }
  .artist-avatar { width: 88px; height: 88px; max-width: 100%; border-radius: 50%; overflow: hidden; background: var(--cover-bg); display: flex; align-items: center; justify-content: center; color: var(--subtle); font-size: 1.45rem; margin-bottom: 0.65rem; box-shadow: 0 12px 28px rgba(0,0,0,0.32); }
  .artist-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .artist-name { color: var(--text); font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .artist-meta { color: var(--muted); font-size: 0.76rem; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-empty { color: var(--subtle); text-align: center; padding: 3rem 0; }
  .search-shell[data-filter="best"] #songs,
  .search-shell[data-filter="best"] .result-shelf,
  .search-shell[data-filter="songs"] #top-result,
  .search-shell[data-filter="songs"] .result-shelf,
  .search-shell[data-filter="artists"] .search-overview,
  .search-shell[data-filter="artists"] .result-shelf:not(#artists),
  .search-shell[data-filter="albums"] .search-overview,
  .search-shell[data-filter="albums"] .result-shelf:not(#albums),
  .search-shell[data-filter="library"] .search-overview,
  .search-shell[data-filter="library"] .result-shelf:not(#library) { display: none; }
  .search-shell[data-filter="best"] .search-overview,
  .search-shell[data-filter="songs"] .search-overview { grid-template-columns: 1fr; }
  @media (max-width: 900px) {
    .search-overview { grid-template-columns: 1fr; }
    .top-result-card { min-height: 120px; }
  }
  @media (max-width: 560px) {
    .search-shell { gap: 0.9rem; padding: 0.7rem; border-radius: 8px; }
    .search-hero h1 { width: 100%; transform: none; }
    .search-input-wrap { width: 100%; transform: none; }
    .horizontal-shelf { grid-auto-columns: minmax(122px, 40vw); gap: 0.65rem; }
    .artist-shelf { grid-auto-columns: minmax(118px, 38vw); gap: 0.65rem; }
    .top-result-card { grid-template-columns: 64px minmax(0, 1fr); gap: 0.75rem; }
    .top-result-cover { width: 64px; height: 64px; }
    .top-result-about p { max-height: 4.85rem; }
    .track-row { grid-template-columns: 44px minmax(0, 1fr); }
    .track-mark { display: none; }
  }
</style>
{% endblock %}

{% block content %}
<div class="search-hero">
  <h1>Search</h1>
  <div class="search-input-wrap">
    <span class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 21l-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>
    <input
      id="search-input"
      type="text"
      value="{{ query }}"
      placeholder="Artist, album, track, or URL"
      class="search-input"
      autofocus
      autocomplete="off"
    >
  </div>
</div>

<div id="results-grid">
  {% include "partials/search_results.html" %}
</div>

<script>
  const input = document.getElementById('search-input');
  const grid = document.getElementById('results-grid');
  let timer;

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    timer = setTimeout(async () => {
      try {
        const res = await fetch(`/search?q=${encodeURIComponent(q)}`, {
          headers: { 'HX-Request': 'true' }
        });
        grid.innerHTML = await res.text();
        window.hydrateSkeletonImages?.(grid);
      } catch(e) {}
    }, 400);
  });

  grid.addEventListener('click', (event) => {
    const button = event.target.closest('[data-result-filter]');
    if (!button) return;

    const shell = button.closest('.search-shell');
    if (!shell) return;

    const filter = button.dataset.resultFilter || 'all';
    shell.dataset.filter = filter;
    shell.querySelectorAll('[data-result-filter]').forEach((item) => {
      item.setAttribute('aria-pressed', item.dataset.resultFilter === filter ? 'true' : 'false');
    });
  });
</script>
{% endblock %}
