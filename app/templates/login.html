{% set app_theme = settings.app_theme if settings.app_theme in ["redwave", "black", "light"] else "redwave" %}
<!DOCTYPE html>
<html lang="en" class="{{ 'light' if app_theme == 'light' else 'dark' }} theme-{{ app_theme }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redwave — Login</title>
  <style>
    .theme-redwave {
      --page-bg: #0f0f17;
      --page-image: url('/static/bg.jpg');
      --page-bg-size: cover;
      --page-bg-repeat: no-repeat;
      --page-bg-position: center;
      --body-bg: rgba(15,15,23,0.48);
      --panel-strong: rgba(22,22,31,0.9);
      --panel-hover: rgba(30,30,46,0.96);
      --text: #f9fafb;
      --muted: #9ca3af;
      --subtle: #6b7280;
      --border: #2a2a3a;
      --border-soft: rgba(255,255,255,0.08);
      --accent: #c0392b;
      --accent-hover: #e74c3c;
      --input-bg: rgba(15,15,23,0.88);
      --input-text: #f9fafb;
      --input-border: #2a2a3a;
      --input-placeholder: #6b7280;
      color-scheme: dark;
    }
    .theme-black {
      --page-bg: #202326;
      --page-image: url('https://redacted.sh/static/styles/assets/backgrounds/Dark-down.svg');
      --page-bg-size: 220px 255px;
      --page-bg-repeat: repeat;
      --page-bg-position: top left;
      --body-bg: rgba(8,9,10,0.08);
      --panel-strong: rgba(23,26,29,0.9);
      --panel-hover: rgba(31,35,38,0.96);
      --text: #f8fafc;
      --muted: #9aa4b2;
      --subtle: #697386;
      --border: #34393e;
      --border-soft: rgba(255,255,255,0.1);
      --accent: #d04536;
      --accent-hover: #f05a49;
      --input-bg: rgba(255,255,255,0.08);
      --input-text: #f8fafc;
      --input-border: rgba(255,255,255,0.13);
      --input-placeholder: #8993a2;
      color-scheme: dark;
    }
    .theme-light {
      --page-bg: #eef1f4;
      --page-image: url('https://redacted.sh/static/styles/assets/backgrounds/Light-down.svg');
      --page-bg-size: 220px 255px;
      --page-bg-repeat: repeat;
      --page-bg-position: top left;
      --body-bg: rgba(255,255,255,0.46);
      --panel-strong: rgba(255,255,255,0.96);
      --panel-hover: rgba(248,250,252,0.98);
      --text: #15191f;
      --muted: #586373;
      --subtle: #7a8494;
      --border: #cfd7e3;
      --border-soft: rgba(24,32,43,0.12);
      --accent: #bf362d;
      --accent-hover: #d6493f;
      --input-bg: #ffffff;
      --input-text: #111827;
      --input-border: #cbd5e1;
      --input-placeholder: #8a94a5;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background-color: var(--page-bg);
      background-image: var(--page-image);
      background-size: var(--page-bg-size);
      background-repeat: var(--page-bg-repeat);
      background-position: var(--page-bg-position);
      background-attachment: fixed;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--body-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      width: min(100%, 25rem);
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: var(--panel-strong);
      padding: clamp(1.5rem, 5vw, 2.5rem);
      box-shadow: 0 18px 60px rgba(0,0,0,0.36);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .login-head {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-head h1 {
      color: var(--accent);
      font-size: 2rem;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
      margin: 0;
    }
    .login-head p {
      color: var(--muted);
      font-size: 0.875rem;
      margin: 0.45rem 0 0;
    }
    .login-error {
      background: rgba(192,57,43,0.14);
      border: 1px solid rgba(192,57,43,0.38);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 1.25rem;
      color: var(--accent-hover);
      font-size: 0.875rem;
      text-align: center;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--input-text);
      padding: 0.68rem 0.875rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .16s, box-shadow .16s, background .16s;
    }
    input::placeholder { color: var(--input-placeholder); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.2);
    }
    button {
      width: 100%;
      margin-top: 0.5rem;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 0.78rem;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .16s, transform .16s;
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-head">
      <h1>Redwave</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div>
        <label for="username">Username</label>
        <input id="username" type="text" name="username" autofocus autocomplete="username">
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit">Sign In</button>
    </form>
  </main>
</body>
</html>
