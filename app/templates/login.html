<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redwave — Login</title>
  <script>tailwind = { config: { darkMode: 'class' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html {
      background-color: #0f0f17;
      background-image: url('/static/bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    body { background-color: rgba(15,15,23,0.75); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div style="background:#16161f; border:1px solid #2a2a3a; border-radius:1rem; padding:2.5rem; width:100%; max-width:400px;">
    <div class="text-center mb-8">
      <h1 style="color:#c0392b; font-size:2rem; font-weight:800; letter-spacing:0.05em;">Redwave</h1>
      <p style="color:#6b7280; font-size:0.875rem; margin-top:0.25rem;">Sign in to continue</p>
    </div>

    {% if error %}
    <div style="background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.4); border-radius:0.5rem; padding:0.75rem; margin-bottom:1.25rem; color:#e74c3c; font-size:0.875rem; text-align:center;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="flex flex-col gap-4">
      <div>
        <label style="display:block; color:#9ca3af; font-size:0.875rem; margin-bottom:0.35rem;">Username</label>
        <input type="text" name="username" autofocus autocomplete="username"
          style="width:100%; background:#0f0f17; border:1px solid #2a2a3a; border-radius:0.5rem; padding:0.65rem 0.875rem; color:#fff; font-size:0.95rem; outline:none; box-sizing:border-box;"
          onfocus="this.style.borderColor='#c0392b'" onblur="this.style.borderColor='#2a2a3a'">
      </div>
      <div>
        <label style="display:block; color:#9ca3af; font-size:0.875rem; margin-bottom:0.35rem;">Password</label>
        <input type="password" name="password" autocomplete="current-password"
          style="width:100%; background:#0f0f17; border:1px solid #2a2a3a; border-radius:0.5rem; padding:0.65rem 0.875rem; color:#fff; font-size:0.95rem; outline:none; box-sizing:border-box;"
          onfocus="this.style.borderColor='#c0392b'" onblur="this.style.borderColor='#2a2a3a'">
      </div>
      <button type="submit"
        style="background:#c0392b; color:#fff; font-weight:700; font-size:0.95rem; padding:0.75rem; border-radius:0.5rem; border:none; cursor:pointer; margin-top:0.5rem; letter-spacing:0.05em; transition:background 0.2s;"
        onmouseover="this.style.background='#e74c3c'" onmouseout="this.style.background='#c0392b'">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
